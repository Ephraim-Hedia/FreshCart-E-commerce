<section class="py-8">
  <div class="container mx-auto px-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      @for (banner of banners; track banner.id) {
        <a
          [routerLink]="banner.link"
          [class]="banner.bgColor"
          class="rounded-3xl p-8 text-white hover:scale-[1.02] transition-transform duration-300 relative overflow-hidden"
        >
          <!-- Decorative circles -->
          <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -translate-y-1/3 translate-x-1/3"></div>
          <div class="absolute bottom-0 right-0 w-48 h-48 bg-white/5 rounded-full translate-y-1/3 translate-x-1/4"></div>

          <div class="relative z-10 flex flex-col h-full">
            <!-- Badge -->
            <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-sm px-4 py-2 rounded-full w-fit mb-6">
              <span class="text-lg">{{ banner.badgeIcon }}</span>
              <span class="text-sm font-semibold">{{ banner.badge }}</span>
            </div>

            <!-- Title -->
            <h3 class="text-3xl md:text-4xl font-bold mb-3">
              {{ banner.title }}
            </h3>

            <!-- Subtitle -->
            <p class="text-white/95 mb-6 text-base">
              {{ banner.subtitle }}
            </p>

            <!-- Discount & Code -->
            <div class="mb-8">
              <div class="flex items-baseline gap-3 mb-2">
                <span class="text-5xl font-bold">
                  {{ banner.discount }}
                </span>
              </div>
              <p class="text-sm text-white/90">
                Use code: <span class="font-bold">{{ banner.code }}</span>
              </p>
            </div>

            <!-- Button -->
            <div class="mt-auto">
              <div class="inline-flex items-center gap-2 bg-white px-8 py-3 rounded-full font-bold hover:shadow-lg transition-shadow"
                   [class]="banner.buttonTextColor">
                <span>{{ banner.buttonText }}</span>
                <i class="fa-solid fa-arrow-right text-sm"></i>
              </div>
            </div>
          </div>
        </a>
      }
    </div>
  </div>
</section>
