<section class="py-6 bg-green-50 border-b border-gray-200">
    <div class="container mx-auto px-4">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        @for (feature of features; track feature.id) {
          <div class="flex items-center gap-4">
            <!-- Icon with background -->
            <div class="bg-primary/5 rounded-xl p-3 shrink-0">
              @switch (feature.icon) {
                @case ('truck') {
                  <i class="fa-solid fa-truck text-primary text-lg"></i>
                }
                @case ('refresh') {
                  <i class="fa-solid fa-rotate-right text-primary text-lg"></i>
                }
                @case ('shield') {
                  <i class="fa-solid fa-shield-halved text-primary text-lg"></i>
                }
                @case ('support') {
                  <i class="fa-solid fa-headset text-primary text-lg"></i>
                }
              }
            </div>
  
            <!-- Content -->
            <div>
              <h3 class="text-sm font-semibold text-gray-900 mb-0.5">
                {{ feature.title }}
              </h3>
              <p class="text-xs text-gray-500">
                {{ feature.description }}
              </p>
            </div>
          </div>
        }
      </div>
    </div>
  </section>
