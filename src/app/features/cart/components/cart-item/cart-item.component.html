<div
  class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 sm:p-5 transition-opacity duration-200"
  [class.opacity-50]="isLoading()"
>
  <div class="flex gap-4 sm:gap-6">

    <!-- Image + In Stock badge -->
    <div class="relative shrink-0">
      <div class="w-28 h-28 sm:w-32 sm:h-32 rounded-xl bg-gradient-to-br from-gray-50 via-white to-gray-100 p-3 border border-gray-100 overflow-hidden">
        <a routerLink="/products/{{ item().product.id }}/{{ item().product.slug }}">
        <img
          [src]="item().product.imageCover"
          [alt]="item().product.title"
          class="w-full h-full object-contain"
        >
        </a>
      </div>
      <div class="absolute -bottom-1 -right-1 bg-primary text-white text-[10px] font-semibold px-2 py-0.5 rounded-full flex items-center gap-1">
        <i class="fa-solid fa-check text-[8px]"></i> In Stock
      </div>
    </div>

    <!-- Content -->
    <div class="flex-1 min-w-0 flex flex-col">

      <!-- Title + Category + SKU -->
      <div class="mb-3">
        <h3 routerLink="/products/{{ item().product.id }}/{{ item().product.slug }}" class="font-semibold text-gray-900 leading-relaxed text-base sm:text-lg truncate">
          {{ item().product.title }}
        </h3>
        <div class="flex items-center gap-2 mt-2 flex-wrap">
          <span class="inline-block px-2.5 py-1 bg-gradient-to-r from-green-50 to-emerald-50 text-primary text-xs font-medium rounded-full">
            {{ item().product.category.name }}
          </span>
          <span class="text-xs text-gray-400">•</span>
          <span class="text-xs text-gray-500">SKU: {{ sku() }}</span>
        </div>
      </div>

      <!-- Price per unit -->
      <div class="mb-4">
        <div class="flex items-baseline gap-2">
          <span class="text-primary font-bold text-lg">{{ item().price }} EGP</span>
          <span class="text-xs text-gray-400">per unit</span>
        </div>
      </div>

      <!-- Bottom row: Quantity + Total + Delete -->
      <div class="mt-auto flex flex-wrap items-center justify-between gap-4">

        <!-- Quantity controls (wrapped in gray pill) -->
        <div class="flex items-center bg-gray-50 rounded-xl p-1 border border-gray-200">
          <button
            type="button"
            (click)="decrease.emit()"
            [disabled]="item().count <= 1 || isLoading()"
            class="cursor-pointer h-8 w-8 rounded-lg bg-white shadow-sm flex items-center justify-center text-gray-500 hover:text-gray-700 hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none transition-all"
            aria-label="Decrease quantity"
          >
            <i class="fa-solid fa-minus text-xs"></i>
          </button>

          <span class="w-12 text-center font-bold text-gray-900">{{ item().count }}</span>

          <button
            type="button"
            (click)="increase.emit()"
            [disabled]="isLoading()"
            class="cursor-pointer h-8 w-8 rounded-lg bg-primary shadow-sm flex items-center justify-center text-white hover:bg-green-700 disabled:opacity-40 disabled:cursor-not-allowed transition-all"
            aria-label="Increase quantity"
          >
            <i class="fa-solid fa-plus text-xs"></i>
          </button>
        </div>

        <!-- Total + Delete -->
        <div class="flex items-center gap-4">
          <div class="text-right">
            <p class="text-xs text-gray-400 mb-0.5">Total</p>
            <p class="text-xl font-bold text-gray-900">
              {{ itemTotal() }}
              <span class="text-sm font-medium text-gray-400">EGP</span>
            </p>
          </div>

          <button
            type="button"
            (click)="remove.emit()"
            [disabled]="isLoading()"
            class="cursor-pointer h-10 w-10 rounded-xl border border-red-200 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white hover:border-red-500 flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200"
            title="Remove item"
            aria-label="Remove from cart"
          >
            @if (isLoading()) {
              <i class="fa-solid fa-spinner fa-spin text-sm"></i>
            } @else {
              <i class="fa-solid fa-trash text-sm"></i>
            }
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
