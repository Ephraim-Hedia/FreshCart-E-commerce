<a
  [routerLink]="['/shop']"
  [queryParams]="{ category: category()._id }"
  class="group block bg-white rounded-2xl p-4 hover:shadow-lg transition-all duration-300 border border-gray-100 hover:border-primary/20"
>
  <!-- Image -->
  <div class="aspect-square mb-3 overflow-hidden rounded-xl bg-gray-50">
    <img
      [src]="category().image"
      [alt]="category().name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
    >
  </div>

  <!-- Name -->
  <h3 class="text-center text-sm font-semibold text-gray-900 group-hover:text-primary transition-colors">
    {{ category().name }}
  </h3>
</a>
