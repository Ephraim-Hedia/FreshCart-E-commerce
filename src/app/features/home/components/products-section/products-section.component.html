<section class="py-8">
    <div class="container mx-auto px-4">
      <app-section-header
        title="Featured"
        titleHighlight="Products"
      />
  
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
        @for (product of products(); track product._id) {
          <app-product-card [product]="product" />
        }
      </div>
    </div>
  </section>
