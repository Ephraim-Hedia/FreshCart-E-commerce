<section class="py-10">
  <div class="container mx-auto px-4">
    <div class="grid md:grid-cols-2 gap-6">

      @for (banner of banners; track banner.id; let i = $index) {
        <div
          #bannerCard
          class="banner-card relative overflow-hidden rounded-2xl p-8 text-white"
          [class]="banner.bgColor"
          [attr.data-delay]="i * 150"
        >
          <!-- Decorative circles (matching original positions) -->
          <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -translate-y-1/2 translate-x-1/2"></div>
          <div class="absolute bottom-0 left-0 w-32 h-32 bg-white/10 rounded-full translate-y-1/2 -translate-x-1/2"></div>

          <div class="relative z-10">

            <!-- Badge -->
            <div class="inline-flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full text-sm mb-4">
              <span>{{ banner.badgeIcon }}</span>
              <span>{{ banner.badge }}</span>
            </div>

            <!-- Title -->
            <h3 class="text-2xl md:text-3xl font-bold mb-2">
              {{ banner.title }}
            </h3>

            <!-- Subtitle -->
            <p class="text-white/80 mb-4">
              {{ banner.subtitle }}
            </p>

            <!-- Discount + Code (side by side) -->
            <div class="flex items-center gap-4 mb-6">
              <div class="text-3xl font-bold">{{ banner.discount }}</div>
              <div class="text-sm text-white/70">
                Use code: <span class="font-bold text-white">{{ banner.code }}</span>
              </div>
            </div>

            <!-- Button -->
            <a
              [routerLink]="banner.link"
              class="inline-flex items-center gap-2 bg-white px-6 py-3 rounded-full font-semibold hover:bg-gray-100 transition-colors"
              [class]="banner.buttonTextColor"
            >
              {{ banner.buttonText }}
              <i class="fa-solid fa-arrow-right text-sm"></i>
            </a>

          </div>
        </div>
      }

    </div>
  </div>
</section>
